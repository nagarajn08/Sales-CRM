# ── Redirect HTTP → HTTPS and www → non-www ──────────────────────────────────
server {
    listen 80;
    server_name trackmylead.in www.trackmylead.in;
    return 301 https://trackmylead.in$request_uri;
}

server {
    listen 443 ssl;
    server_name www.trackmylead.in;
    ssl_certificate     /etc/letsencrypt/live/trackmylead.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trackmylead.in/privkey.pem;
    return 301 https://trackmylead.in$request_uri;
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name trackmylead.in;

    ssl_certificate     /etc/letsencrypt/live/trackmylead.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trackmylead.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "DENY"                                 always;
    add_header X-XSS-Protection          "1; mode=block"                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               application/rss+xml font/woff2 image/svg+xml;

    # ── Cache static assets aggressively (Vite adds content hash to filenames) ─
    location ~* \.(js|css|woff2|woff|ttf|otf|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Proxy API and webhook calls to the backend container ─────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cookie_path  /                 /;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 20M;
    }

    # ── React SPA — serve index.html for all unknown routes ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
