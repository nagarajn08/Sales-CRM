<?xml version="1.0" encoding="UTF-8"?>
<!-- TrackmyLead — Primary Logo (light background) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 68" fill="none">
  <defs>
    <linearGradient id="pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- ─── Icon Mark ─── -->
  <g transform="translate(4, 4)">
    <!-- Drop shadow -->
    <ellipse cx="19" cy="57" rx="9" ry="2.5" fill="#7c3aed" opacity="0.16"/>
    <!-- Pin body -->
    <path d="M19 3 A15 15 0 0 1 34 18 C34 30 22 44 19 52 C16 44 4 30 4 18 A15 15 0 0 1 19 3 Z"
          fill="url(#pin)"/>
    <!-- Gloss highlight -->
    <path d="M19 5 A13 13 0 0 1 30 13 C28 10 24 6 19 5 Z" fill="white" opacity="0.2"/>
    <!-- Trend line -->
    <path d="M13 23 L19 18 L25 13"
          stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>
    <!-- Track dots -->
    <circle cx="13" cy="23" r="2.6" fill="white"/>
    <circle cx="19" cy="18" r="2.6" fill="white"/>
    <circle cx="25" cy="13" r="2.6" fill="white"/>
  </g>

  <!-- ─── Wordmark ─── -->
  <text y="43"
        font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="29" letter-spacing="-0.8">
    <tspan x="52" font-weight="800" fill="#1e293b">Track</tspan><tspan font-weight="300" fill="#6366f1">my</tspan><tspan font-weight="800" fill="#1e293b">Lead</tspan>
  </text>

  <!-- ─── Tagline ─── -->
  <text x="52" y="57"
        font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif"
        font-size="9" font-weight="600" fill="#94a3b8" letter-spacing="2">SALES INTELLIGENCE PLATFORM</text>
</svg>
