<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.96)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.86)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Inner glow -->
  <rect width="512" height="512" rx="96" fill="url(#bg)" opacity="0.3"/>
  <!-- Pin body (white) -->
  <path d="M256 52 A148 148 0 0 1 404 200 C404 296 268 420 256 444 C244 420 108 296 108 200 A148 148 0 0 1 256 52 Z"
        fill="url(#pin)"/>
  <!-- Gloss highlight -->
  <path d="M256 64 A136 136 0 0 1 372 136 C360 108 316 68 256 64 Z" fill="white" opacity="0.18"/>
  <!-- Trend line (sparkline) -->
  <path d="M178 240 L256 174 L334 108"
        stroke="#6366f1" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Track dots -->
  <circle cx="178" cy="240" r="36" fill="#6366f1"/>
  <circle cx="256" cy="174" r="36" fill="#6366f1"/>
  <circle cx="334" cy="108" r="36" fill="#6366f1"/>
</svg>
